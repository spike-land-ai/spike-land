name: Incremental Tests (Docker Cache)

on:
  workflow_dispatch:
  # Disabled from automatic triggers — ci.yml already runs incremental tests natively.
  # Use manually via Actions tab or `gh workflow run test-incremental.yml` when needed.

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      run_all: ${{ steps.detect.outputs.run_all }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        run: |
          pkgs=$(bash scripts/detect-changed-packages.sh --base origin/main --head HEAD)
          if [ "$pkgs" = "ALL" ] || [ -z "$pkgs" ] || [ "$pkgs" = "NO_CHANGES" ]; then
            if [ "$pkgs" = "ALL" ]; then
              echo "run_all=true" >> $GITHUB_OUTPUT
            else
              echo "run_all=false" >> $GITHUB_OUTPUT
            fi
            echo "packages=[]" >> $GITHUB_OUTPUT
          else
            json=$(echo "$pkgs" | jq -R . | jq -sc .)
            echo "packages=$json" >> $GITHUB_OUTPUT
            echo "run_all=false" >> $GITHUB_OUTPUT
          fi

  test-packages:
    needs: detect-changes
    if: needs.detect-changes.outputs.run_all == 'false' && needs.detect-changes.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Test ${{ matrix.package }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.test
          target: test-${{ matrix.package }}
          push: false
          cache-from: type=gha,scope=test-${{ matrix.package }}
          cache-to: type=gha,scope=test-${{ matrix.package }},mode=max

  test-all:
    needs: detect-changes
    if: needs.detect-changes.outputs.run_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Test all packages
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.test
          target: test-all
          push: false
          cache-from: type=gha,scope=test-all
          cache-to: type=gha,scope=test-all,mode=max
