  <body class="antialiased selection:bg-primary/30">
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme-preference') || 'system';
          var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', isDark);
          document.body.style.backgroundColor = isDark ? '#09090b' : '#f9fafb';
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="../../src/spike-app/main.tsx"></script>
  </body>
