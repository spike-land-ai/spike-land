<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 32 32"
  width="32"
  height="32"
>
  <defs>
    <style>
    @keyframes pulse-glow {
      0%, 100% {
        filter: drop-shadow(0 0 3px #f59e0b) drop-shadow(0 0 6px #fbbf24);
        opacity: 1;
      }
      50% {
        filter: drop-shadow(0 0 6px #f59e0b) drop-shadow(0 0 14px #fcd34d)
          drop-shadow(0 0 20px #fbbf24);
        opacity: 0.92;
      }
    }
    @keyframes bolt-charge {
      0%, 85%, 100% {
        transform: scaleY(1) translateY(0);
      }
      90% {
        transform: scaleY(1.04) translateY(-0.5px);
      }
      95% {
        transform: scaleY(0.97) translateY(0.3px);
      }
    }
    .bolt {
      transform-origin: 16px 16px;
      animation:
        pulse-glow 2.4s ease-in-out infinite,
        bolt-charge 2.4s ease-in-out infinite;
    }
    </style>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="60%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2e" />
      <stop offset="100%" stop-color="#0b0e14" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)" />

  <!-- Animated lightning bolt spike -->
  <path
    class="bolt"
    d="M18.5 3L8 18h7.5l-2 11L24 14h-7.5z"
    fill="url(#boltGrad)"
    stroke="#FCD34D"
    stroke-width="0.4"
    stroke-linejoin="round"
  />
</svg>
